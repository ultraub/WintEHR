# WintEHR Docker Compose Configuration
#
# Usage:
#   Development:  docker compose --profile dev up -d
#   Production:   docker compose --profile prod up -d
#
# Or use deploy.sh:
#   ./deploy.sh                      # Defaults to dev profile
#   ./deploy.sh --environment prod   # Uses prod profile
#
# Prerequisites:
#   1. Copy .env.example to .env
#   2. Update .env with your settings
#   3. Run deployment

# ============================================================
# SHARED CONFIG ANCHORS
# ============================================================
# Infrastructure services (redis, postgres, hapi-fhir) are split into -dev and
# -prod variants so the prod profile can run WITHOUT publishing ports to the
# host. Dev keeps ports published for local tooling (psql, redis-cli, direct
# curl to HAPI). Prod relies on the internal Docker network and nginx proxy.
#
# Same container_name across variants is safe because only one profile runs
# at a time. Network aliases ensure the canonical hostnames (postgres, redis,
# hapi-fhir) still resolve regardless of which variant is active.

x-redis-common: &redis-common
  image: redis:7-alpine
  container_name: emr-redis
  restart: ${RESTART_POLICY:-no}
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 5s
  command: redis-server --maxmemory ${REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru

x-postgres-common: &postgres-common
  image: postgres:15-alpine
  container_name: emr-postgres
  restart: ${RESTART_POLICY:-no}
  environment:
    POSTGRES_USER: ${POSTGRES_USER:-emr_user}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emr_password}
    POSTGRES_DB: ${POSTGRES_DB:-emr_db}
    POSTGRES_INITDB_ARGS: "--auth-local=trust --auth-host=md5"
  volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./postgres-init:/docker-entrypoint-initdb.d:ro
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emr_user} -d ${POSTGRES_DB:-emr_db}"]
    interval: 15s
    timeout: 10s
    retries: 10
    start_period: 30s

x-hapi-fhir-common: &hapi-fhir-common
  # Custom HAPI build that adds POST /admin/cr/flush-caches for clearing
  # the cqf-fhir-cr in-memory caches when a student edits a ValueSet.
  # See deploy/hapi-overlay/ for the Dockerfile + Java source. The base
  # is hapiproject/hapi:v8.6.0-1 — we pin the same upstream tag via
  # the HAPI_VERSION build arg so behavior matches the official image
  # except for our admin endpoint.
  build:
    context: ./deploy/hapi-overlay
    args:
      HAPI_VERSION: image/v8.8.0-1
  image: wintehr-hapi-fhir:overlay-v8.8.0-1
  container_name: emr-hapi-fhir
  restart: ${RESTART_POLICY:-no}
  environment:
    spring.datasource.url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-emr_db}
    spring.datasource.username: ${POSTGRES_USER:-emr_user}
    spring.datasource.password: ${POSTGRES_PASSWORD:-emr_password}
    spring.datasource.driverClassName: org.postgresql.Driver
    spring.jpa.properties.hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgres94Dialect
    hapi.fhir.fhir_version: R4
    hapi.fhir.server_address: ${HAPI_FHIR_SERVER_ADDRESS:-https://${DOMAIN:-localhost}/fhir/R4}
    hapi.fhir.allow_external_references: true
    hapi.fhir.allow_multiple_delete: true
    hapi.fhir.allow_cascading_deletes: true
    hapi.fhir.cors.allowed_origin: "*"
    # Disabled: HAPI normally caches search-result Bundles for 60s and serves
    # repeat queries from cache. For our CR use case that breaks the
    # ValueSet edit → next $apply round trip — the second search is a
    # cache hit on the pre-edit expansion. Educational traffic is low
    # enough that the cache hit isn't worth the staleness; correctness
    # wins. (See backend/tests/integration/test_cr_cache_flush.py.)
    hapi.fhir.reuse_cached_search_results_millis: 0
    hapi.fhir.default_page_size: 20
    hapi.fhir.max_page_size: 500
    hapi.fhir.cdshooks.enabled: true
    hapi.fhir.cr.enabled: true
    # Hibernate Search left disabled. We upgraded the overlay to
    # v8.8.0-1 (from v8.6.0-1) which fixes HSEARCH800001 — the
    # version drift between starter and clinical-reasoning that broke
    # `:in` resolution on v8.6 is resolved here (both pin HAPI 8.8.0).
    # However hapi-fhir #7739 is still open and it bites us in a new
    # place: even with HSearch bootstrapped cleanly, CodeSystem URL
    # search returns 0 results post-reindex, so ValueSet pre-expansion
    # can't validate `system=http://hl7.org/fhir/sid/cvx` and saves 0
    # concepts. Without pre-expansion, `:in` returns no codes.
    #
    # Until #7739 is closed, the inline CQL rewrite in
    # cql_artifact_builder.py remains the chosen path. Re-enable
    # HSearch when:
    #   1. starter v8.8.0-1+ ✅ (we're on it)
    #   2. CR/HAPI version alignment ✅ (resolved on v8.8)
    #   3. hapi-fhir #7739 closed ❌ (still open)
    hapi.fhir.advanced_lucene_indexing: false
    # Token for the /admin/cr/* endpoints exposed by our overlay. The
    # composer (in the FastAPI backend) calls those endpoints with this
    # token to flush CR caches after a ValueSet edit so the change is
    # immediately reflected without waiting for a HAPI restart.
    HAPI_ADMIN_TOKEN: ${HAPI_ADMIN_TOKEN:-}
    # JVM heap sized for the bulk Synthea bundle load (100 patients ≈
    # thousands of resources through HAPI's transaction processor at once).
    # 1.5G was too tight — OOM-killed mid-load on a fresh deploy.
    JAVA_TOOL_OPTIONS: "-Xmx3g -Xms512m"
  deploy:
    resources:
      limits:
        memory: 4g
  healthcheck:
    disable: true

services:
  # ============================================================
  # INFRASTRUCTURE SERVICES
  # ============================================================

  # Redis: dev publishes 6379; prod keeps it internal to the Docker network.
  redis-dev:
    <<: *redis-common
    profiles: ["dev"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      emr-network:
        aliases:
          - redis

  redis-prod:
    <<: *redis-common
    profiles: ["prod"]
    networks:
      emr-network:
        aliases:
          - redis

  # PostgreSQL: dev publishes 5432 for local tooling; prod keeps it internal.
  # Note: POSTGRES_INITDB_ARGS uses --auth-local=trust — only reachable from
  # inside the container. External connections (when published) still require
  # a password via md5 auth.
  postgres-dev:
    <<: *postgres-common
    profiles: ["dev"]
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      emr-network:
        aliases:
          - postgres

  postgres-prod:
    <<: *postgres-common
    profiles: ["prod"]
    networks:
      emr-network:
        aliases:
          - postgres

  # ============================================================
  # DCM4CHEE DICOM
  # ============================================================

  ldap:
    image: dcm4che/slapd-dcm4chee:2.6.10-34.2
    container_name: vna-ldap
    networks:
      vna:
        aliases:
          - ldap
      emr-network:
        aliases:
          - ldap
    logging:
      driver: json-file
      options:
        max-size: "10m"
    ports:
      - "389:389"
    environment:
      STORAGE_DIR: /storage/fs1
    volumes:
      - /var/local/dcm4chee-arc/ldap:/var/lib/openldap/openldap-data
      - /var/local/dcm4chee-arc/slapd.d:/etc/openldap/slapd.d
  db:
    image: dcm4che/postgres-dcm4chee:17.4-34
    container_name: vna-db
    networks:
      vna:
        aliases:
          - db
      emr-network:
        aliases:
          - db
    logging:
      driver: json-file
      options:
        max-size: "10m"
    ports:
     - "5433:5432"
    environment:
      POSTGRES_DB: pacsdb
      POSTGRES_USER: pacs
      POSTGRES_PASSWORD: pacs
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /var/local/dcm4chee-arc/db:/var/lib/postgresql/data
  arc:
    image: dcm4che/dcm4chee-arc-psql:5.34.2
    container_name: vna-arc
    networks:
      vna:
        aliases:
          - arc
      emr-network:
        aliases:
          - arc
    logging:
      driver: json-file
      options:
        max-size: "10m"
    ports:
      - "8080:8080"
      - "8443:8443"
      - "9990:9990"
      - "9993:9993"
      - "11112:11112"
      - "2762:2762"
      - "2575:2575"
      - "12575:12575"
    environment:
      POSTGRES_DB: pacsdb
      POSTGRES_USER: pacs
      POSTGRES_PASSWORD: pacs
      WILDFLY_CHOWN: /storage
      WILDFLY_WAIT_FOR: ldap:389 db:5432
    depends_on:
      - ldap
      - db
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /var/local/dcm4chee-arc/wildfly:/opt/wildfly/standalone
      - /var/local/dcm4chee-arc/storage:/storage

  # ============================================================
  # HAPI FHIR SERVER
  # ============================================================

  # HAPI FHIR: dev publishes 8888 for direct API access; prod routes all
  # traffic through nginx (/fhir/R4/) for SMART token validation.
  hapi-fhir-dev:
    <<: *hapi-fhir-common
    profiles: ["dev"]
    ports:
      - "${HAPI_FHIR_PORT:-8888}:8080"
    networks:
      emr-network:
        aliases:
          - hapi-fhir
    depends_on:
      postgres-dev:
        condition: service_healthy

  hapi-fhir-prod:
    <<: *hapi-fhir-common
    profiles: ["prod"]
    networks:
      emr-network:
        aliases:
          - hapi-fhir
    depends_on:
      postgres-prod:
        condition: service_healthy

  # ============================================================
  # APPLICATION SERVICES
  # ============================================================

  # Backend API (Development)
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: emr-backend
    profiles: ["dev"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backend/data/generated_dicoms:/app/data/generated_dicoms
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-emr_user}:${POSTGRES_PASSWORD:-emr_password}@postgres:5432/${POSTGRES_DB:-emr_db}
      - JWT_ENABLED=${JWT_ENABLED:-false}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS_CACHE=true
      - HAPI_FHIR_URL=http://hapi-fhir:8080/fhir
      - HAPI_ADMIN_TOKEN=${HAPI_ADMIN_TOKEN:-}
      - DICOM_QIDO_URL=${DICOM_QIDO_URL:-http://arc:8080/dcm4chee-arc/aets/DCM4CHEE/rs}
      - DICOM_WADO_URL=${DICOM_WADO_URL:-http://arc:8080/dcm4chee-arc/aets/DCM4CHEE/wado}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SMART_BASE_URL=${SMART_BASE_URL:-http://localhost:8000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    networks:
      emr-network:
        aliases:
          - backend  # Alias so nginx config works for both dev and prod
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # Backend API (Production)
  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emr-backend
    profiles: ["prod"]
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backend/data/generated_dicoms:/app/data/generated_dicoms
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-emr_user}:${POSTGRES_PASSWORD:-emr_password}@postgres:5432/${POSTGRES_DB:-emr_db}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-emr_password}
      - POSTGRES_USER=${POSTGRES_USER:-emr_user}
      - POSTGRES_DB=${POSTGRES_DB:-emr_db}
      - JWT_ENABLED=${JWT_ENABLED:-false}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS_CACHE=true
      - HAPI_FHIR_URL=http://hapi-fhir:8080/fhir
      - HAPI_ADMIN_TOKEN=${HAPI_ADMIN_TOKEN:-}
      - DICOM_QIDO_URL=${DICOM_QIDO_URL:-http://arc:8080/dcm4chee-arc/aets/DCM4CHEE/rs}
      - DICOM_WADO_URL=${DICOM_WADO_URL:-http://arc:8080/dcm4chee-arc/aets/DCM4CHEE/wado}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DOMAIN=${DOMAIN:-localhost}
      - FRONTEND_URL=${FRONTEND_URL:-}
      - SMART_BASE_URL=${SMART_BASE_URL:-}
    networks:
      emr-network:
        aliases:
          - backend  # Alias so nginx config works for both dev and prod
    depends_on:
      postgres-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
      hapi-fhir-prod:
        condition: service_started

  # Frontend (Development)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: emr-frontend
    profiles: ["dev"]
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Use relative URLs - nginx proxies to backend (no CORS needed)
      - REACT_APP_FHIR_ENDPOINT=${REACT_APP_FHIR_ENDPOINT:-/fhir/R4}
      - REACT_APP_EMR_API=${REACT_APP_EMR_API:-/api/emr}
      - REACT_APP_CLINICAL_CANVAS_API=${REACT_APP_CLINICAL_CANVAS_API:-/api/clinical-canvas}
      - REACT_APP_API_URL=${REACT_APP_API_URL:-}
      # WebSocket URL — leave empty for auto-detection from window.location
      - REACT_APP_WEBSOCKET_URL=${REACT_APP_WEBSOCKET_URL:-}
    networks:
      - emr-network
    depends_on:
      - backend-dev

  # Frontend (Production)
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_FHIR_ENDPOINT=${REACT_APP_FHIR_ENDPOINT:-https://${DOMAIN:-localhost}/fhir/R4}
        - REACT_APP_EMR_API=${REACT_APP_EMR_API:-https://${DOMAIN:-localhost}/api/emr}
        - REACT_APP_CLINICAL_CANVAS_API=${REACT_APP_CLINICAL_CANVAS_API:-https://${DOMAIN:-localhost}/api/clinical-canvas}
        - REACT_APP_API_URL=${REACT_APP_API_URL:-https://${DOMAIN:-localhost}}
        - REACT_APP_WS_URL=${REACT_APP_WS_URL:-wss://${DOMAIN:-localhost}/ws}
    container_name: emr-frontend
    profiles: ["prod"]
    restart: unless-stopped
    networks:
      - emr-network
    depends_on:
      - backend-prod

  # ============================================================
  # PRODUCTION-ONLY SERVICES
  # ============================================================

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:1.25-alpine
    container_name: emr-nginx
    profiles: ["prod"]
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - emr-network
    depends_on:
      - backend-prod
      - frontend-prod
      - hapi-fhir-prod
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # Certbot for Let's Encrypt SSL (Production)
  certbot:
    image: certbot/certbot
    container_name: emr-certbot
    profiles: ["prod"]
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# ============================================================
# NETWORKS AND VOLUMES
# ============================================================

networks:
  emr-network:
    driver: bridge
  vna:
    driver: bridge

volumes:
  postgres_data:
